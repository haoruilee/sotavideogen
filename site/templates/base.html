<!DOCTYPE html>
<html lang="{{ html_lang }}">

    <title>{% if head_display_title %}{{ head_display_title }}{% else %}{{ title }} — {{ site.name }}{% endif %}</title>
    <meta name="description" content="{{ description }}" />
{% include 'partials/head_seo.html' %}
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/site.css" />
  </head>
  <body>
    <a class="sr-only" href="#main">跳到主要内容</a>

    {% include 'partials/header.html' %}

    <main id="main" class="{% block main_classes %}wrap tool-page{% endblock %}">

    {% include 'partials/footer.html' %}
