{% from 'partials/paths.html' import root, path %}
<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="{{ root(prefix) }}">
      <span class="brand-mark" aria-hidden="true">SV</span>
      <span>Sota Video Gen</span>
    </a>
    <button
      type="button"
      class="nav-toggle"
      data-nav-toggle
      aria-expanded="false"
      aria-controls="site-nav"
    >
      菜单
    </button>
    <nav id="site-nav" class="nav" data-nav aria-label="主导航">
      <a href="{{ root(prefix) }}"{% if nav_active == 'home' %} aria-current="page"{% endif %}>首页</a>
      <a href="{{ path(prefix, 'ai-tools') }}"{% if nav_active == 'tools' %} aria-current="page"{% endif %}>AI 工具</a>
      <a href="{{ path(prefix, 'pricing') }}"{% if nav_active == 'pricing' %} aria-current="page"{% endif %}>定价</a>
      <a href="/app/"{% if nav_active == 'app' %} aria-current="page"{% endif %}>应用</a>
      <a href="{{ path(prefix, 'blog') }}"{% if nav_active == 'blog' %} aria-current="page"{% endif %}>博客</a>
      <a href="/docs/"{% if nav_active == 'docs' %} aria-current="page"{% endif %}>文档</a>
      <a class="btn btn-primary" href="/app/">打开工作台</a>
    </nav>
  </div>
</header>
